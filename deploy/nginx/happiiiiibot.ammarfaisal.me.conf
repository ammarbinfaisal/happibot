##
## happiiiiibot.ammarfaisal.me (HTTP only)
## - Reverse proxy to Rust backend (host port 8580 -> container 8080)
## - ACME challenge location for certbot --webroot
##

upstream happi_backend_upstream {
  # Backend is published via Docker on host port 8580 (container listens on 8080).
  server 127.0.0.1:8580;
  keepalive 32;
}

server {
  listen 80;
  server_name happiiiiibot.ammarfaisal.me;

  access_log /var/log/nginx/happiiiiibot.access.log;
  error_log  /var/log/nginx/happiiiiibot.error.log;

  # For certbot --webroot:
  # certbot certonly --webroot -w /var/www/certbot -d happiiiiibot.ammarfaisal.me
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
  }

  # API -> backend
  location = /healthz {
    proxy_pass http://happi_backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /v1/ {
    proxy_pass http://happi_backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Everything else -> backend (keep API domain backend-only).
  location / {
    proxy_pass http://happi_backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
