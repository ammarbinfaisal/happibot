services:
  backend:
    build:
      context: ./backend
    environment:
      BIND_ADDR: 0.0.0.0:8080
      DATABASE_URL: sqlite:///data/happi.db?mode=rwc
      # Set this in your env/shell for initData verification:
      # TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      RUST_LOG: info
    ports:
      - "8080:8080"
    volumes:
      - happi-data:/data

volumes:
  happi-data: {}

